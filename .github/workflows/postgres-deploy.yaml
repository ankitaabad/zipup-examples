name: WireGuard Postgres Connectivity Check

on:
  workflow_dispatch:

jobs:
  test-vpn:
    runs-on: ubuntu-latest

    steps:
      - name: Install WireGuard
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard

      - name: Write WireGuard config securely
        run: |
          echo "${{ secrets.WG_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf > /dev/null
          sudo chmod 600 /etc/wireguard/wg0.conf

      - name: Start WireGuard
        run: sudo wg-quick up wg0

      - name: Wait for WireGuard handshake
        run: |
          for i in {1..10}; do
            wg show wg0 latest-handshakes | grep -v "0$" && exit 0
            echo "Waiting for handshake..."
            sleep 1
          done
          echo "WireGuard handshake failed"
          exit 1

      - name: Check Postgres port
        run: nc -zv 10.13.13.1 5432

      - name: Cleanup
        if: always()
        run: sudo wg-quick down wg0